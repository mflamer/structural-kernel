name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    name: Linux (xara engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
      - name: Install (with the xara engine)
        run: uv sync --extra xara
      - name: Probe xara availability
        run: |
          uv run python - <<'PY'
          import importlib
          import pathlib
          import sys
          import traceback

          import opensees

          package_dir = pathlib.Path(opensees.__file__).parent
          print("=== opensees contents ===")
          print(sorted(p.name for p in package_dir.iterdir()))
          print("=== import opensees.openseespy ===")
          try:
              importlib.import_module("opensees.openseespy")
              print("ok")
          except Exception:
              traceback.print_exc()
          sys.stdout.flush()
          PY
      - name: Lint
        run: uv run ruff check && uv run ruff format --check
      - name: Typecheck
        run: uv run pyright
      - name: Test (verification suite runs through xara here)
        run: uv run pytest -v

  windows:
    name: Windows (reference engine only)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
      - name: Install
        run: uv sync
      - name: Test
        run: uv run pytest
