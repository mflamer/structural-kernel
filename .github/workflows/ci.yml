name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    # Python 3.13, not 3.14: the engine's native wheels top out at cp313
    # (see the requires-python note in pyproject.toml). The interpreter
    # comes from actions/setup-python because uv's managed CPython bundles
    # Tcl 9, and OpenSeesRT's extension is compiled for Tcl 8.x.
    name: Linux (xara engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        id: python
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v5
      - name: Grant read access to the private design libraries
        shell: bash
        env:
          NDSWOOD_DEPLOY_KEY: ${{ secrets.NDSWOOD_DEPLOY_KEY }}
          AISCSTEEL_DEPLOY_KEY: ${{ secrets.AISCSTEEL_DEPLOY_KEY }}
          ACICONCRETE_DEPLOY_KEY: ${{ secrets.ACICONCRETE_DEPLOY_KEY }}
        run: bash .github/deploy-keys.sh
      - name: Install (with the xara engine)
        run: uv sync --extra xara --python '${{ steps.python.outputs.python-path }}'
      - name: Probe xara availability
        run: |
          uv run python - <<'PY'
          import importlib
          import pathlib
          import sys
          import traceback

          import opensees

          package_dir = pathlib.Path(opensees.__file__).parent
          print("=== opensees contents ===")
          print(sorted(p.name for p in package_dir.iterdir()))
          print("=== import opensees.openseespy ===")
          try:
              importlib.import_module("opensees.openseespy")
              print("ok")
          except Exception:
              traceback.print_exc()
          sys.stdout.flush()
          PY
      - name: Lint
        run: uv run ruff check && uv run ruff format --check
      - name: Typecheck
        run: uv run pyright
      - name: Test (verification suite runs through xara here)
        run: uv run pytest -v

  windows:
    name: Windows (reference engine only)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
      - name: Grant read access to the private design libraries
        shell: bash
        env:
          NDSWOOD_DEPLOY_KEY: ${{ secrets.NDSWOOD_DEPLOY_KEY }}
          AISCSTEEL_DEPLOY_KEY: ${{ secrets.AISCSTEEL_DEPLOY_KEY }}
          ACICONCRETE_DEPLOY_KEY: ${{ secrets.ACICONCRETE_DEPLOY_KEY }}
        run: bash .github/deploy-keys.sh
      - name: Install
        run: uv sync
      - name: Test
        run: uv run pytest
