name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    name: Linux (xara engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
      - name: Install (with the xara engine)
        run: uv sync --extra xara
      - name: Probe xara availability
        run: |
          uv run python - <<'PY'
          import importlib
          import pathlib
          import traceback

          import xara

          print("=== xara __init__ source ===")
          print(pathlib.Path(xara.__file__).read_text()[:4000])
          print("=== internal imports ===")
          for name in ("xara.model", "opensees.openseesrt", "opensees.OpenSeesPyRT"):
              try:
                  importlib.import_module(name)
                  print(name, "-> ok")
              except Exception:
                  print(f"--- {name} failed ---")
                  traceback.print_exc()
          PY
      - name: Lint
        run: uv run ruff check && uv run ruff format --check
      - name: Typecheck
        run: uv run pyright
      - name: Test (verification suite runs through xara here)
        run: uv run pytest -v

  windows:
    name: Windows (reference engine only)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
      - name: Install
        run: uv sync
      - name: Test
        run: uv run pytest
